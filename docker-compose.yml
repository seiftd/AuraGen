version: '3.8'

services:
  # MongoDB Database
  mongodb:
    image: mongo:6
    container_name: auragen-mongodb
    restart: unless-stopped
    ports:
      - "27017:27017"
    environment:
      MONGO_INITDB_ROOT_USERNAME: admin
      MONGO_INITDB_ROOT_PASSWORD: password
      MONGO_INITDB_DATABASE: auragen-ai
    volumes:
      - mongodb_data:/data/db
      - ./scripts/mongo-init.js:/docker-entrypoint-initdb.d/mongo-init.js:ro
    networks:
      - auragen-network

  # Redis Cache
  redis:
    image: redis:7-alpine
    container_name: auragen-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    command: redis-server --appendonly yes --requirepass redis123
    volumes:
      - redis_data:/data
    networks:
      - auragen-network

  # Backend API
  backend:
    build:
      context: ./packages/backend
      dockerfile: Dockerfile
    container_name: auragen-backend
    restart: unless-stopped
    ports:
      - "3001:3001"
    environment:
      NODE_ENV: development
      PORT: 3001
      MONGODB_URI: mongodb://admin:password@mongodb:27017/auragen-ai?authSource=admin
      REDIS_URL: redis://:redis123@redis:6379
      JWT_SECRET: dev-jwt-secret-key-change-in-production
      JWT_REFRESH_SECRET: dev-refresh-secret-key-change-in-production
    depends_on:
      - mongodb
      - redis
    volumes:
      - ./packages/backend:/app
      - /app/node_modules
      - ./uploads:/app/uploads
    networks:
      - auragen-network

  # Admin Dashboard
  admin-dashboard:
    build:
      context: ./packages/admin-dashboard
      dockerfile: Dockerfile
    container_name: auragen-admin
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      VITE_API_URL: http://localhost:3001/api/v1
      VITE_SOCKET_URL: http://localhost:3001
    depends_on:
      - backend
    volumes:
      - ./packages/admin-dashboard:/app
      - /app/node_modules
    networks:
      - auragen-network

  # Nginx Reverse Proxy (Production)
  nginx:
    image: nginx:alpine
    container_name: auragen-nginx
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
      - ./ssl:/etc/nginx/ssl:ro
    depends_on:
      - backend
      - admin-dashboard
    networks:
      - auragen-network
    profiles:
      - production

volumes:
  mongodb_data:
    driver: local
  redis_data:
    driver: local

networks:
  auragen-network:
    driver: bridge